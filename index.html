<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東光醫療器材</title>
  <script>
    // Fix relative URLs after history.pushState changes the URL path.
    // Sets <base href> to the app root once on load so all relative paths
    // (images, CSS, JS, fetch calls) always resolve from the correct base.
    (function () {
      if (location.protocol === 'file:') return; // skip for local file access
      var segs = location.pathname.split('/').filter(Boolean);
      var routeRoots = { category: 1, product: 1, search: 1 };
      var base = (segs.length > 0 && !routeRoots[segs[0]]) ? '/' + segs[0] + '/' : '/';
      var el = document.createElement('base');
      el.href = base;
      document.head.appendChild(el);
    })();
  </script>
  <meta name="description" content="東光醫療器材 SINCE1992 — 專業醫療器材目錄，提供行動輔具、居家照護、衛浴安全等商品">
  <link rel="icon" href="assets/images/logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header id="site-header">
    <div class="header-inner">
      <button class="hamburger" id="hamburger-btn" aria-label="開啟選單" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

        <div class="site-logo-text">
          <span class="site-name">東光醫療器材</span>
          <span class="site-sub">SINCE 1992</span>
        </div>
      </a>

      <div class="header-search">
        <input type="search" id="search-input" placeholder="搜尋商品..." autocomplete="off" aria-label="搜尋商品">
        <button id="search-btn" aria-label="搜尋">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== PAGE LAYOUT ===== -->
  <div class="page-layout">

    <!-- SIDEBAR -->
    <aside id="sidebar" aria-label="商品分類">

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          商品分類
        </div>
        <nav id="category-tree" aria-label="商品分類導覽">
          <!-- injected by catalog.js -->
          <div class="sidebar-loading">載入中...</div>
        </nav>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content">

      <!-- Breadcrumb -->
      <nav id="breadcrumb" aria-label="麵包屑導覽" hidden></nav>

      <!-- VIEW: Homepage -->
      <div id="view-home" class="view" hidden>
        <div class="home-banner">
          <img src="assets/images/logo.jpg" alt="東光醫療器材" class="home-banner-logo">
          <div class="home-banner-text">
            <h1>東光醫療器材</h1>
            <p>專業醫療器材，服務台灣超過30年</p>
          </div>
        </div>
        <div id="category-showcase" class="category-showcase"></div>
      </div>

      <!-- VIEW: Category listing -->
      <div id="view-catalog" class="view" hidden>
        <div class="catalog-header">
          <h2 id="catalog-title"></h2>
          <span id="catalog-count" class="catalog-count"></span>
        </div>
        <div id="product-grid" class="product-grid"></div>
      </div>

      <!-- VIEW: Product detail -->
      <div id="view-product" class="view" hidden>
        <div id="product-detail-container"></div>
      </div>

      <!-- VIEW: Search results -->
      <div id="view-search" class="view" hidden>
        <div class="catalog-header">
          <h2 id="search-title"></h2>
          <span id="search-count" class="catalog-count"></span>
        </div>
        <div id="search-grid" class="product-grid"></div>
        <div id="search-empty" class="empty-state" hidden>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>找不到符合的商品</p>
          <p class="empty-hint">請試試其他關鍵字</p>
        </div>
      </div>

    </main>
  </div>

  <!-- ===== FOOTER ===== -->

        <img src="assets/images/logo.jpg" alt="東光醫療器材" class="footer-logo">
        <p class="footer-tagline">專業醫療器材<br>SINCE 1992</p>
      </div>
      <div class="footer-col">
        <h3>聯絡資訊</h3>
        <ul class="footer-info">
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91A16 16 0 0 0 16 17l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 23.73 18z"/></svg>
            04-2405-0660
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            週一至週五 09:00–18:00
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            台中市大里區大德街79、81號
          </li>
        </ul>
      </div>
      <div class="footer-col">
        <h3>商品分類</h3>
        <nav id="footer-nav" aria-label="頁尾分類導覽">
          <!-- injected by catalog.js -->
        </nav>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 東光醫療器材有限公司 SINCE 1992. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay" hidden aria-hidden="true"></div>

  <!-- Scripts (load order matters — no ES modules) -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/catalog.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/product.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
