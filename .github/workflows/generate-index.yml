name: 產生商品目錄索引

on:
  push:
    branches:
      - main
    paths:
      - 'products/**'      # 只有 products/ 有變更才執行

permissions:
  contents: write          # 需要寫入 products-index.json

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run index generator
        run: python3 .github/scripts/generate_index.py

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products-index.json
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: 自動更新 products-index.json [skip ci]"
          git push
